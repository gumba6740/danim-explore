name: test_danim

services:
  db_test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: danim_test
      POSTGRES_USER: danim_test
      POSTGRES_PASSWORD: danim_test
    ports:
      - "7878:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis_test:
    image: redis:7-alpine
    ports:
      - "8787:6379"


volumes:
  postgres_data:
